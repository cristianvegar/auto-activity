name: Auto Commit

on:
  push:
    branches: [ "main" ]   # 👈 esto lo hace visible
  schedule:
    - cron: "0 14 * * *"  # automático diario
  workflow_dispatch:       # 👈 botón manual

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Config Git
        run: |
          git config --global user.name "Cristian Vega"
          git config --global user.email "TU_EMAIL_AQUI"

      - name: Run script
        run: |
          python auto_commit.py

      - name: Push
        run: |
          git push
