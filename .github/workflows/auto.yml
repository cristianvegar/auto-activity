name: AM Auto Commit

on:
  schedule:
    - cron: "0 14 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-activity-main
  cancel-in-progress: false

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Config Git
        run: |
          git config --global user.name "Cristian Vega"
          git config --global user.email "crisvegarodri@gmail.com"

      - name: Connect GitLab
        run: |
          git remote remove gitlab || true
          git remote add gitlab https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/cristianvega/auto-activity.git

      # SYNC INICIAL (estable)
      - name: Initial sync
        run: |
          git fetch origin main
          git fetch gitlab main

          git checkout -B main origin/main

          git rebase gitlab/main || (git rebase --abort && echo "skip rebase gitlab")

      - name: Run script
        run: |
          python auto_commit.py

      # SYNC FINAL (clave para evitar stale)
      - name: Final sync before push
        run: |
          git fetch origin main
          git fetch gitlab main

          git rebase origin/main || (git rebase --abort && echo "skip rebase origin")
          git rebase gitlab/main || (git rebase --abort && echo "skip rebase gitlab")

      # PUSH ROBUSTO
      - name: Push GitHub and GitLab
        run: |
          git push origin main --force-with-lease
          git push gitlab main --force-with-lease
