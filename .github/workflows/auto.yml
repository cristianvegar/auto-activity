name: AM Auto Commit

on:
  schedule:
    - cron: "0 14 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-activity-main
  cancel-in-progress: false

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Config Git
        run: |
          git config --global user.name "Cristian Vega"
          git config --global user.email "crisvegarodri@gmail.com"

      - name: Connect GitLab
        run: |
          git remote remove gitlab || true
          git remote add gitlab https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/cristianvega/auto-activity.git

      - name: Sync from GitLab
        run: |
          git fetch gitlab main
          git checkout main
          git rebase gitlab/main || (git rebase --abort && echo "skip rebase")

      - name: Run script
        run: |
          python auto_commit.py

      - name: Push GitLab and GitHub
        run: |
          git push origin main --force-with-lease
          git push gitlab main --force-with-lease
